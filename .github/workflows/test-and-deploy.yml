name: Test and Deploy

# Run on every push to main. The pull-request trigger lets us see tests
# pass before merging, but doesn't deploy.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ===================================================================
  # JOB 1: Unit tests + coverage
  # ===================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          # Caches pip downloads across CI runs so re-installs are fast.
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        # Sets DISABLE_RATE_LIMIT and DISABLE_CSRF for the test run, matching
        # what conftest.py does on local. Belt-and-suspenders in case CI's
        # env loads differently.
        env:
          DISABLE_RATE_LIMIT: "1"
          DISABLE_CSRF: "1"
        run: |
          pytest tests/unit/ --cov --cov-report=term --cov-report=xml

      - name: Upload coverage report
        # Lets us inspect coverage in the GitHub Actions UI if anything fails.
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7


  # ===================================================================
  # JOB 2: End-to-end Playwright tests
  # ===================================================================
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run e2e in parallel with unit tests. If either fails, deploy is blocked.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Playwright browsers
        # `playwright install --with-deps` grabs Chromium AND the OS libs
        # it needs (fonts, gtk, etc.) — without --with-deps the browser
        # often fails to launch on ubuntu-latest.
        run: |
          playwright install --with-deps chromium

      - name: Create .env file for the server
        # The e2e tests need a running uvicorn that uses these credentials.
        # We generate a one-off SESSION_SECRET per CI run.
        run: |
          python -c "import secrets; print(f'SESSION_SECRET={secrets.token_urlsafe(32)}')" >> .env
          echo "ADMIN_USERNAME=admin" >> .env
          echo "ADMIN_PASSWORD=admin" >> .env
          echo "RP_ID=localhost" >> .env
          echo "RP_NAME=CafeSync CI" >> .env
          echo "WEBAUTHN_ORIGINS=http://localhost:8000" >> .env
          echo "DB_PATH=cafesync_ci.db" >> .env

      - name: Start uvicorn in background
        # Start the server, wait for it to be reachable, then run tests.
        # nohup + & detaches the process so the workflow step can proceed.
        run: |
          rm -f cafesync_ci.db
          nohup uvicorn main:app --host 0.0.0.0 --port 8000 > uvicorn.log 2>&1 &
          # Wait up to 30s for /health to return 200.
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Server is up after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8000/health || (echo "Server failed to start"; cat uvicorn.log; exit 1)

      - name: Run Playwright tests
        run: |
          pytest tests/e2e/

      - name: Upload Playwright trace on failure
        # If a test failed, Playwright's trace files help diagnose without
        # needing to reproduce locally. They show every page action.
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-trace
          path: test-results/
          retention-days: 7

      - name: Upload uvicorn log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: uvicorn-log
          path: uvicorn.log
          retention-days: 7


  # Note: deployment is handled by Render natively. In Render's
  # service settings, "Auto-Deploy" is set to "After CI Checks Pass",
  # which means Render watches GitHub Actions and deploys automatically
  # when both unit-tests and e2e-tests succeed. We don't need a deploy
  # job here.
